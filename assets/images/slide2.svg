<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <linearGradient id="slide2Bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ad78ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4bd3ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="320" fill="url(#slide2Bg)"/>
  
  <!-- Decorative Elements -->
  <circle cx="150" cy="60" r="100" fill="#ad78ff" opacity="0.1"/>
  <circle cx="650" cy="260" r="90" fill="#4bd3ff" opacity="0.1"/>
  
  <!-- Phone Mockup -->
  <rect x="180" y="50" width="150" height="300" rx="22" ry="22" fill="#0a0a1a" stroke="#2a2a4a" stroke-width="2"/>
  <rect x="190" y="70" width="130" height="220" rx="12" ry="12" fill="#1a1a2e"/>
  <rect x="200" y="85" width="110" height="70" rx="10" ry="10" fill="url(#accent2)" opacity="0.4"/>
  <rect x="200" y="170" width="50" height="50" rx="10" ry="10" fill="#4bd3ff" opacity="0.3"/>
  <rect x="260" y="170" width="50" height="50" rx="10" ry="10" fill="#5effbf" opacity="0.3"/>
  <circle cx="255" cy="62" r="7" fill="#2a2a4a"/>
  
  <!-- Text Content -->
  <text x="400" y="100" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">Latest</text>
  <text x="400" y="145" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ad78ff">Releases</text>
  <text x="400" y="190" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">Be the first to experience</text>
  <text x="400" y="215" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">cutting-edge mobile innovation</text>
  
  <!-- CTA Badge -->
  <rect x="400" y="240" width="180" height="45" rx="25" ry="25" fill="url(#accent2)" opacity="0.2" stroke="url(#accent2)" stroke-width="1"/>
  <text x="490" y="268" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Explore Now</text>
</svg>
