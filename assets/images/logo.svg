<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Mobile Icon -->
  <rect x="10" y="10" width="35" height="60" rx="5" ry="5" fill="url(#logoGradient)" />
  <rect x="15" y="18" width="25" height="40" rx="2" ry="2" fill="#1a1a2e" />
  <circle cx="27.5" cy="62" r="3" fill="#1a1a2e" />
  
  <!-- Text: AR -->
  <text x="60" y="45" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFD700">AR</text>
  
  <!-- Text: Chennai -->
  <text x="105" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#ffffff">Chennai</text>
  
  <!-- Text: Mobiles -->
  <text x="60" y="68" font-family="Arial, sans-serif" font-size="18" font-weight="500" fill="#FF6B35" letter-spacing="2">MOBILES</text>
</svg>
