<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 600" width="300" height="600">
  <defs>
    <linearGradient id="phoneGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4bd3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5effbf;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Phone Body -->
  <rect x="30" y="20" width="240" height="560" rx="35" ry="35" fill="url(#phoneGradient)" stroke="#2a2a4a" stroke-width="2"/>
  
  <!-- Screen -->
  <rect x="45" y="50" width="210" height="480" rx="25" ry="25" fill="#0a0a1a"/>
  
  <!-- Screen Content - Abstract UI -->
  <rect x="55" y="60" width="190" height="100" rx="15" ry="15" fill="url(#screenGradient)" opacity="0.3"/>
  <rect x="55" y="175" width="190" height="60" rx="10" ry="10" fill="#4bd3ff" opacity="0.2"/>
  <rect x="55" y="250" width="90" height="90" rx="15" ry="15" fill="#5effbf" opacity="0.25"/>
  <rect x="155" y="250" width="90" height="90" rx="15" ry="15" fill="#ad78ff" opacity="0.25"/>
  <rect x="55" y="355" width="190" height="40" rx="10" ry="10" fill="#4bd3ff" opacity="0.15"/>
  <rect x="55" y="410" width="120" height="40" rx="10" ry="10" fill="#5effbf" opacity="0.2"/>
  <rect x="185" y="410" width="60" height="40" rx="10" ry="10" fill="#ad78ff" opacity="0.2"/>
  
  <!-- Notch -->
  <rect x="110" y="28" width="80" height="25" rx="12" ry="12" fill="#0a0a1a"/>
  <circle cx="150" cy="40" r="8" fill="#2a2a4a"/>
  
  <!-- Side Buttons -->
  <rect x="25" y="120" width="5" height="40" rx="2" ry="2" fill="#2a2a4a"/>
  <rect x="25" y="180" width="5" height="30" rx="2" ry="2" fill="#2a2a4a"/>
  <rect x="270" y="140" width="5" height="50" rx="2" ry="2" fill="#2a2a4a"/>
  
  <!-- Camera Module -->
  <rect x="200" y="35" width="55" height="55" rx="15" ry="15" fill="#1a1a2e" stroke="#2a2a4a" stroke-width="1"/>
  <circle cx="220" cy="55" r="12" fill="#2a2a4a" stroke="#3a3a5a" stroke-width="1"/>
  <circle cx="220" cy="55" r="8" fill="#1a1a2e"/>
  <circle cx="235" cy="70" r="8" fill="#2a2a4a" stroke="#3a3a5a" stroke-width="1"/>
  <circle cx="235" cy="70" r="5" fill="#1a1a2e"/>
  
  <!-- Glow Effect -->
  <ellipse cx="150" cy="300" rx="100" ry="150" fill="url(#screenGradient)" opacity="0.1" filter="url(#glow)"/>
</svg>
