<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <linearGradient id="slide1Bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4bd3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5effbf;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="320" fill="url(#slide1Bg)"/>
  
  <!-- Decorative Elements -->
  <circle cx="700" cy="80" r="120" fill="#4bd3ff" opacity="0.1"/>
  <circle cx="100" cy="280" r="80" fill="#5effbf" opacity="0.1"/>
  
  <!-- Phone Mockup -->
  <rect x="480" y="60" width="140" height="280" rx="20" ry="20" fill="#0a0a1a" stroke="#2a2a4a" stroke-width="2"/>
  <rect x="490" y="80" width="120" height="200" rx="10" ry="10" fill="#1a1a2e"/>
  <rect x="500" y="90" width="100" height="60" rx="8" ry="8" fill="url(#accent1)" opacity="0.4"/>
  <rect x="500" y="160" width="45" height="45" rx="8" ry="8" fill="#5effbf" opacity="0.3"/>
  <rect x="555" y="160" width="45" height="45" rx="8" ry="8" fill="#ad78ff" opacity="0.3"/>
  <circle cx="550" cy="70" r="6" fill="#2a2a4a"/>
  
  <!-- Text Content -->
  <text x="60" y="100" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">Flagship</text>
  <text x="60" y="145" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#4bd3ff">Collection</text>
  <text x="60" y="190" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">Experience the future of mobile technology</text>
  <text x="60" y="215" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">with our premium smartphone lineup</text>
  
  <!-- CTA Badge -->
  <rect x="60" y="240" width="160" height="45" rx="25" ry="25" fill="url(#accent1)" opacity="0.2" stroke="url(#accent1)" stroke-width="1"/>
  <text x="140" y="268" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Shop Now</text>
</svg>
