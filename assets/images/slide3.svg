<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <linearGradient id="slide3Bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5effbf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ad78ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="320" fill="url(#slide3Bg)"/>
  
  <!-- Decorative Elements -->
  <circle cx="400" cy="160" r="140" fill="#5effbf" opacity="0.05"/>
  <circle cx="600" cy="100" r="70" fill="#ad78ff" opacity="0.1"/>
  
  <!-- Accessories Icons -->
  <circle cx="200" cy="120" r="40" fill="#1a1a2e" stroke="#2a2a4a" stroke-width="2"/>
  <rect x="185" y="105" width="30" height="30" rx="5" ry="5" fill="url(#accent3)" opacity="0.4"/>
  
  <circle cx="300" cy="120" r="40" fill="#1a1a2e" stroke="#2a2a4a" stroke-width="2"/>
  <circle cx="300" cy="120" r="15" fill="#2a2a4a"/>
  <circle cx="300" cy="120" r="8" fill="url(#accent3)" opacity="0.5"/>
  
  <circle cx="400" cy="120" r="40" fill="#1a1a2e" stroke="#2a2a4a" stroke-width="2"/>
  <rect x="385" y="108" width="30" height="24" rx="4" ry="4" fill="url(#accent3)" opacity="0.4"/>
  
  <!-- Text Content -->
  <text x="250" y="220" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">Premium</text>
  <text x="250" y="265" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#5effbf">Accessories</text>
  <text x="250" y="295" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">Complete your mobile experience</text>
  
  <!-- CTA Badge -->
  <rect x="520" y="200" width="200" height="50" rx="25" ry="25" fill="url(#accent3)" opacity="0.2" stroke="url(#accent3)" stroke-width="1"/>
  <text x="620" y="230" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">View Collection</text>
</svg>
