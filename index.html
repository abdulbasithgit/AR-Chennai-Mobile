<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="AR Chennai Mobiles website is temporarily unavailable. We will be back soon."
    />
    <title>AR Chennai Mobiles | We'll be back soon</title>
    <link rel="icon" type="image/x-icon" href="assets/images/AR-premium-favicon.ico" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        background: radial-gradient(circle at top, #1a1a2e 0%, #0f0f1a 100%);
        color: #f5f5f5;
        padding: 24px;
      }
      .card {
        max-width: 560px;
      }
      .logo {
        width: 140px;
        height: auto;
        margin-bottom: 32px;
      }
      h1 {
        font-size: clamp(1.8rem, 5vw, 2.6rem);
        font-weight: 700;
        margin-bottom: 16px;
        letter-spacing: 0.5px;
      }
      .accent {
        color: #f4b400;
      }
      p {
        font-size: clamp(1rem, 2.5vw, 1.15rem);
        line-height: 1.6;
        color: #c9c9d4;
        margin-bottom: 12px;
      }
      .divider {
        width: 60px;
        height: 3px;
        background: #f4b400;
        border-radius: 2px;
        margin: 28px auto;
      }
      .footer {
        margin-top: 36px;
        font-size: 0.85rem;
        color: #7a7a88;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img
        class="logo"
        src="assets/images/logoImg.png"
        alt="AR Chennai Mobiles"
        onerror="this.style.display='none'"
      />
      <h1>We&rsquo;ll be back <span class="accent">soon</span></h1>
      <div class="divider"></div>
      <p>
        Our website is temporarily unavailable while we carry out some
        maintenance.
      </p>
      <p>Thank you for your patience &mdash; please check back shortly.</p>
      <div class="footer">&copy; AR Chennai Mobiles</div>
    </div>
  </body>
</html>
